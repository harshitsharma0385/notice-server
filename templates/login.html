<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login — DICE Notice Board</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
    /* ── Tokens ───────────────────────────────────────────────────────────── */
    :root {
        --bg:          #080c12;
        --surface:     #0e1520;
        --surface-2:   #131d2b;
        --border:      rgba(255,255,255,0.07);
        --border-hover:rgba(255,255,255,0.14);
        --text:        #e8edf5;
        --muted:       #5a6880;
        --accent:      #3b82f6;
        --accent-glow: rgba(59,130,246,0.18);
        --green:       #22c55e;
        --green-glow:  rgba(34,197,94,0.2);
        --serif:       'Playfair Display', Georgia, serif;
        --sans:        'Outfit', sans-serif;
        --ease:        cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        height: 100%;
        -webkit-font-smoothing: antialiased;
    }

    body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
    }

    /* ── Background ───────────────────────────────────────────────────────── */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse 70% 60% at 20% 15%, rgba(59,130,246,0.07) 0%, transparent 65%),
            radial-gradient(ellipse 50% 50% at 80% 85%, rgba(34,197,94,0.04) 0%, transparent 65%);
        pointer-events: none;
        z-index: 0;
    }

    /* Subtle grid texture */
    body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
            linear-gradient(rgba(255,255,255,0.013) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.013) 1px, transparent 1px);
        background-size: 48px 48px;
        pointer-events: none;
        z-index: 0;
    }

    /* ── Card ─────────────────────────────────────────────────────────────── */
    .login-wrapper {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 400px;
        animation: fadeUp .55s var(--ease) both;
    }

    .login-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 44px 40px 36px;
        position: relative;
        overflow: hidden;
    }

    /* Top accent line */
    .login-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
        opacity: 0.6;
    }

    /* ── Header ───────────────────────────────────────────────────────────── */
    .login-eyebrow {
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .login-eyebrow::before {
        content: '';
        display: inline-block;
        width: 20px; height: 1px;
        background: var(--accent);
    }

    .login-title {
        font-family: var(--serif);
        font-size: 30px;
        font-weight: 400;
        letter-spacing: -0.01em;
        line-height: 1.2;
        color: var(--text);
        margin-bottom: 6px;
    }
    .login-title em {
        font-style: italic;
        color: rgba(232,237,245,0.45);
    }

    .login-subtitle {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 36px;
        font-weight: 300;
    }

    /* ── Icon lock ────────────────────────────────────────────────────────── */
    .lock-icon {
        width: 48px; height: 48px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 28px;
        color: var(--accent);
    }

    /* ── Form ─────────────────────────────────────────────────────────────── */
    .field-label {
        display: block;
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
        font-weight: 500;
    }

    .input-wrap {
        position: relative;
        margin-bottom: 24px;
    }
    .input-wrap svg {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        pointer-events: none;
        transition: color .2s var(--ease);
    }

    input[type="password"] {
        width: 100%;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-family: var(--sans);
        font-size: 14px;
        font-weight: 400;
        padding: 13px 44px 13px 42px;
        outline: none;
        transition: border-color .2s var(--ease), box-shadow .2s var(--ease);
        -webkit-appearance: none;
        letter-spacing: 0.06em;
    }
    input[type="password"]::placeholder {
        color: var(--muted);
        letter-spacing: 0.02em;
    }
    input[type="password"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
    }
    input[type="password"]:focus + svg,
    .input-wrap:focus-within svg {
        color: var(--accent);
    }

    /* Toggle visibility button */
    .toggle-vis {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        padding: 4px;
        display: flex;
        align-items: center;
        transition: color .2s var(--ease);
        width: auto;
        box-shadow: none;
    }
    .toggle-vis:hover {
        color: var(--text);
        transform: translateY(-50%);
        box-shadow: none;
    }

    /* ── Submit ───────────────────────────────────────────────────────────── */
    .submit-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 14px;
        background: linear-gradient(135deg, #16a34a, #22c55e);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-family: var(--sans);
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: opacity .2s var(--ease), transform .2s var(--ease), box-shadow .2s var(--ease);
        box-shadow: 0 4px 20px var(--green-glow);
        margin-top: 4px;
    }
    .submit-btn:hover {
        opacity: .9;
        transform: translateY(-2px);
        box-shadow: 0 8px 28px var(--green-glow);
    }
    .submit-btn:active {
        transform: translateY(0);
    }

    /* ── Divider ──────────────────────────────────────────────────────────── */
    .card-divider {
        height: 1px;
        background: var(--border);
        margin: 28px 0 20px;
    }

    /* ── Footer ───────────────────────────────────────────────────────────── */
    .login-footer {
        text-align: center;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.04em;
        line-height: 1.8;
    }
    .login-footer strong {
        color: rgba(232,237,245,0.35);
        font-weight: 500;
    }

    /* ── Flash / error message ────────────────────────────────────────────── */
    .error-msg {
        background: rgba(239,68,68,0.1);
        border: 1px solid rgba(239,68,68,0.25);
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 12.5px;
        color: #f87171;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    /* ── Animation ────────────────────────────────────────────────────────── */
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <div class="lock-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </div>

        <div class="login-eyebrow">Secure Access</div>
        <h1 class="login-title">Admin <em>Login</em></h1>
        <p class="login-subtitle">DICE Lab · Notice Board Management</p>

        <!-- Uncomment to show error: -->
        <!-- <div class="error-msg">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Incorrect password. Please try again.
        </div> -->

        <form method="POST">
            <label class="field-label" for="password">Password</label>
            <div class="input-wrap">
                <input type="password" name="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <button type="button" class="toggle-vis" onclick="togglePassword()" aria-label="Toggle visibility" id="toggleBtn">
                    <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>

            <button type="submit" class="submit-btn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                    <polyline points="10 17 15 12 10 7"/>
                    <line x1="15" y1="12" x2="3" y2="12"/>
                </svg>
                Sign In
            </button>
        </form>

        <div class="card-divider"></div>

        <div class="login-footer">
            © 2026 <strong>DICE Lab</strong> · Chitkara University
        </div>

    </div>
</div>

<script>
function togglePassword() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eyeIcon');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    icon.innerHTML = isHidden
        ? `<line x1="1" y1="1" x2="23" y2="23"/>
           <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 11 7 11 7a13.16 13.16 0 0 1-1.67 2.68"/>
           <path d="M6.61 6.61A13.526 13.526 0 0 0 1 12s4 7 11 7a9.74 9.74 0 0 0 5.39-1.61"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
           <circle cx="12" cy="12" r="3"/>`;
}
</script>

</body>
</html>
